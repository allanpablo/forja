name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # O job `test` roda o código-FONTE (.ts desde SPEC-012 Fase 2), e strip-types nativo só
        # existe no Node ≥22.6. Contribuir exige Node moderno. O suporte a Node 20 do pacote
        # PUBLICADO (que embarca dist/*.js) é provado pelo job `release-gate`, que instala o tarball.
        node-version: [22.x, 24.x]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - name: Type-check (checkJs on-ramp, SPEC-012 Fase 1)
        run: npm run types:check
      - run: npm test
      - name: Core smoke test
        run: |
          node bin/forja.ts
          node bin/forja.ts spec:check forja-core

      # O gate do núcleo (ADR-0023) existia e nada o executava automaticamente. Roda na matriz
      # inteira de propósito: o check `native-abi` só tem sentido contra várias versões do Node.
      - name: Doctor do núcleo
        run: node bin/forja.ts tools:doctor

  # O gate do tarball (ADR-0024). Job separado e sem matriz: o custo aqui é o `npm install`
  # compilando o better-sqlite3 do zero, e instalar três vezes não prova mais que instalar uma.
  #
  # Este job é a evidência do release — a prova de que uma instalação limpa funciona passa a viver
  # no log do CI, e não na memória de quem publicou.
  release-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: npm
      - run: npm ci
      - name: Gate do tarball (instalação limpa)
        run: node bin/forja.ts release:check
      # Gate do projeto gerado (ADR-0029), tier barato: gera um projeto isolado e prova que é
      # coerente (sem placeholder vazado, package.json válido, estrutura íntegra). Sem rede — o
      # tier --full (npm install + build) é opt-in, pré-release.
      - name: Gate do projeto gerado
        run: node bin/forja.ts project:smoke
